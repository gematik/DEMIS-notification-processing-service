spring:
  data:
    redis:
      repositories:
        enabled: false
      lettuce:
        pool:
          enabled: false

nps:
  client:
    validation: "http://localhost:${wiremock.server.port}/VS"
    lifecycle-vs: "http://localhost:${wiremock.server.port}/LVS"
    routing: "http://localhost:${wiremock.server.port}/NRS"
    pdfgen: "http://localhost:${wiremock.server.port}/PDF"
    pseudonymization: "http://localhost:${wiremock.server.port}/PS"
    dls: "http://localhost:${wiremock.server.port}/DLS"
    fhir-storage-writer:
      address: "http://localhost:${wiremock.server.port}"
      context-path: /FSW/
    futs:
      address: "http://localhost:${wiremock.server.port}"
      context-path: /FUTS/

  certificate-dir: src/test/resources/certificates
  outcome-issue-threshold: error

  testuser:
    health-office: test-int
    sender-is-destination: false
    ids:
      - irrelevant

demis:
  codemapping:
    enabled: true
    cache-reload-cron: "0 0 0 * * ?"
    client:
      base-url: "http://localhost:${wiremock.server.port}"
      context-path: "/FUTS/"

feature:
  flag:
    filter_invalid_xml_codepoints: true
    notification_pre_check: true
    move-error-id-to-diagnostics: true
    notifications.7_3: true
    new.error.message.for.failed.routing: true